<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense Control SPA</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section id="auth-view" class="auth-view"></section>
      <section id="app-view" class="hidden">
        <header class="topbar">
          <div>
            <p class="eyebrow">Expense Control</p>
            <h1>Personal spending workspace</h1>
          </div>
          <div class="account-pill">
            <span id="current-user"></span>
            <button type="button" id="logout-btn" class="secondary">Sign out</button>
          </div>
        </header>

        <nav class="tabs" aria-label="Primary navigation">
          <button type="button" data-tab="expenses" class="active">Expenses</button>
          <button type="button" data-tab="profile">Profile</button>
          <button type="button" data-tab="admin" id="admin-tab" class="hidden">Admin</button>
        </nav>

        <p id="status" class="status" aria-live="polite"></p>

        <section id="expenses-panel" class="panel"></section>
        <section id="profile-panel" class="panel hidden"></section>
        <section id="admin-panel" class="panel hidden"></section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
